<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Unit 150 Meeting Tracker</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SU150 Tracker">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: #f1f8e9; 
            display: flex; flex-direction: column; align-items: center; 
        }
        
        /* The Card Container */
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            border: 1px solid #e0e0e0;
        }

        h1 { font-size: 1.4rem; color: #005b33; margin-top: 0; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            margin: 20px 0; 
        }
        
        .trefoil-slot { 
            cursor: pointer; padding: 8px; border: 1px solid #eee; 
            border-radius: 8px; transition: 0.3s; 
        }
        
        .trefoil { width: 40px; height: 40px; filter: grayscale(100%) brightness(0.7); transition: 0.3s; }
        .punched .trefoil { filter: grayscale(0%) brightness(100%); }
        
        .date-text { font-size: 0.6rem; color: #999; height: 1em; margin-top: 4px; }
        
        .reward-slot { 
            margin-top: 20px; padding: 15px; border: 2px dashed #00ae58; 
            border-radius: 8px; display: none; background: #e8f5e9; color: #005b33; 
        }
        
        #reset-btn { margin-top: 20px; padding: 8px 16px; background-color: #ff4d4d; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Service Unit 150 Meeting Attendance</h1>
        <div class="grid" id="punch-grid"></div>

        <div class="reward-slot" id="reward-slot">
            <h2>🎉 Reward Unlocked!</h2>
            <p>Congratulations! A $25 GS Shop Gift Card is yours.</p>
        </div>
        
        <button id="reset-btn" onclick="resetTracker()">Reset Tracker</button>
    </div>

    <script>
        const grid = document.getElementById('punch-grid');

        function checkCompletion() {
            let count = 0;
            for (let i = 1; i <= 10; i++) {
                if (localStorage.getItem(`slot-${i}-date`)) count++;
            }
            if (count === 10) {
                document.getElementById('reward-slot').style.display = 'block';
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        }

        for (let i = 1; i <= 10; i++) {
            const slot = document.createElement('div');
            slot.className = 'trefoil-slot';
            slot.id = `slot-${i}`;
            slot.innerHTML = `
                <img src="trefoil.png" class="trefoil" alt="Trefoil">
                <div class="date-text"></div>
            `;
            
            const savedDate = localStorage.getItem(`slot-${i}-date`);
            if (savedDate) {
                slot.classList.add('punched');
                slot.querySelector('.date-text').innerText = savedDate;
            }

            slot.onclick = () => {
                if (!slot.classList.contains('punched')) {
                    const date = new Date().toLocaleDateString();
                    slot.classList.add('punched');
                    slot.querySelector('.date-text').innerText = date;
                    localStorage.setItem(`slot-${i}-date`, date);
                    checkCompletion();
                }
            };
            grid.appendChild(slot);
        }

        checkCompletion();

        function resetTracker() {
            if (confirm("Are you sure you want to clear all punches?")) {
                for (let i = 1; i <= 10; i++) localStorage.removeItem(`slot-${i}-date`);
                location.reload();
            }
        }
    </script>
</body>
</html>
